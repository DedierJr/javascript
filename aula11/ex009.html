<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil(?)</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: #202020;
            font-family: Arial, Helvetica, sans-serif;
        }

        #a1 {
            margin: auto;
            margin-top: 300px;
            color: white;
            background-color: #20202070;
            height: 500px;
            width: 500px;
            font-size: 5rem;
        }
    </style>
</head>
<body>
    <div id="a1">
        <p id="pais"></p>
    </div>
    <script>
        var pais = prompt("Em que país você nasceu?")
        var a = document.getElementById('pais')

        if(pais == 'Brasil'){
            a.innerText = "Você é Brasileiro!"
        } else {
            a.innerText = "Você é estranjeiro!"
        }
    </script>
</body>
</html>
